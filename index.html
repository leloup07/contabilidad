<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #F4F6F9; }
  .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
  .modal { background: #fff; border-radius: 12px; padding: 28px; width: 90%; max-width: 620px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
  .modal h3 { color: #2E6B3A; margin-bottom: 18px; font-size: 18px; }
  .form-row { display: flex; gap: 12px; margin-bottom: 12px; }
  .form-group { display: flex; flex-direction: column; flex: 1; }
  .form-group label { font-size: 11px; color: #7A8DA0; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; font-weight: 600; }
  .form-group input, .form-group select, .form-group textarea { padding: 8px 10px; border: 1px solid #D5DCE4; border-radius: 6px; font-size: 13px; font-family: system-ui; outline: none; transition: border 0.15s; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #3D7A4A; }
  .btn { padding: 8px 18px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.15s; }
  .btn-primary { background: #3D7A4A; color: #fff; }
  .btn-primary:hover { background: #2E6B3A; }
  .btn-danger { background: #C0392B; color: #fff; }
  .btn-danger:hover { background: #A93226; }
  .btn-secondary { background: #E4E9F0; color: #2C3E50; }
  .btn-secondary:hover { background: #D5DCE4; }
  .btn-sm { padding: 4px 10px; font-size: 11px; }
  .btn-export { background: #2980B9; color: #fff; }
  .btn-export:hover { background: #2471A3; }
  .action-bar { display: flex; gap: 8px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
  .search-input { padding: 8px 12px; border: 1px solid #D5DCE4; border-radius: 6px; font-size: 13px; width: 220px; outline: none; }
  .search-input:focus { border-color: #3D7A4A; }
  @media print { .no-print { display: none !important; } }
</style>

<script>
(function(){
  function show(msg, src, line, col, err){
    try{
      var el = document.getElementById("fatalErrorOverlay");
      if(!el){
        el = document.createElement("pre");
        el.id="fatalErrorOverlay";
        el.style.cssText="position:fixed;inset:0;z-index:100000;background:#111;color:#fff;padding:16px;overflow:auto;font:12px/1.4 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;white-space:pre-wrap;";
        document.body.appendChild(el);
      }
      el.textContent = "ERROR JS (pantalla en blanco)\n\n" +
        String(msg||"") + "\n" +
        (src ? ("Fuente: "+src+"\n") : "") +
        (line ? ("Línea: "+line+" Col: "+col+"\n") : "") +
        (err && err.stack ? ("\nStack:\n"+err.stack) : "");
    }catch(e){}
  }
  window.addEventListener("error", function(ev){ show(ev.message, ev.filename, ev.lineno, ev.colno, ev.error); });
  window.addEventListener("unhandledrejection", function(ev){
    show("Unhandled Promise Rejection: "+(ev.reason && ev.reason.message ? ev.reason.message : String(ev.reason||ev)), "", "", "", ev.reason);
  });
})();
</script>

// Equipos: >300€ base → 217 (activo amortizable), ≤300€ → 629 (gasto directo)
const AMORT_RATE = 0.25; // 25% anual equipos informáticos
function generarAsientos(emitidas, recibidas, year, allRecibidas, tesoreria) {
  const preAsientos = [];
  // ─── Facturas emitidas ───
  [...emitidas].forEach(e => {
    const apuntes = [];
    apuntes.push({cuenta:"430",nombre:ctaName("430"),debe:e.total,haber:0});
    apuntes.push({cuenta:"705",nombre:ctaName("705"),debe:0,haber:e.base});
    if(e.iva>0) apuntes.push({cuenta:"477",nombre:ctaName("477"),debe:0,haber:e.iva});
    preAsientos.push({fecha:e.fecha,tipo:"FE",concepto:`Fra.${e.num} — ${e.cliente}`,ref:e.id,apuntes});
  });
  // ─── Facturas recibidas ───
  [...recibidas].forEach(r => {
    const apuntes = [];
    const esActivo = r.cat==="Equipos" && r.base>300;
    const ctaGasto = esActivo ? "217" : (CAT_CUENTA[r.cat]||"629");
    apuntes.push({cuenta:ctaGasto,nombre:ctaName(ctaGasto),debe:r.base,haber:0});
    if(r.iva>0) apuntes.push({cuenta:"472",nombre:ctaName("472"),debe:r.iva,haber:0});
    // medioPago="socio" → H:551 (socio financia)
// medioPago="banco" → H:410 (proveedores); el pago bancario real se registra en Tesorería (D:410 / H:572x)
const ctaContra = (r.medioPago === "socio") ? "551" : "410";
apuntes.push({cuenta:ctaContra,nombre:ctaName(ctaContra),debe:0,haber:r.total});
    preAsientos.push({fecha:r.fecha,tipo:"FR",concepto:`${r.prov||r.proveedor} — ${r.desc}`,ref:r.id,apuntes,esActivo});
  });
  // ─── Amortizaciones (incluye activos de años anteriores que siguen vivos) ───
  const todosActivos = allRecibidas.filter(r=>r.cat==="Equipos"&&r.base>300);
  if(todosActivos.length>0) {
    const trimestres = ["Q1","Q2","Q3","Q4"];
    const fechasTrim = [`${year}-03-31`,`${year}-06-30`,`${year}-09-30`,`${year}-12-31`];
    const hoy = new Date();
    trimestres.forEach((q,qi) => {
      // No dotar amortización de trimestres que aún no han cerrado
      const finTrimDate = new Date(fechasTrim[qi]+"T23:59:59");
      if(finTrimDate > hoy) return;
      let cuotaTrim = 0;
      todosActivos.forEach(a => {
        const yAdq = parseInt(a.fecha.split("-")[0]);
        const mAdq = parseInt(a.fecha.split("-")[1]);
        // Solo si aún no está totalmente amortizado (4 años al 25%)
        if(year - yAdq > 4) return;
        if(yAdq > year) return;
        if(yAdq === year && mAdq > (qi+1)*3) return;
        const inicioTrim = qi*3+1;
        const finTrim = (qi+1)*3;
        let meses = 0;
        for(let m=inicioTrim;m<=finTrim;m++) {
          if(yAdq < year || (yAdq===year && mAdq<=m)) meses++;
        }
        cuotaTrim += (a.base * AMORT_RATE / 12) * meses;
      });
      if(cuotaTrim > 0) {
        cuotaTrim = Math.round(cuotaTrim*100)/100;
        preAsientos.push({fecha:fechasTrim[qi],tipo:"AM",concepto:`Amortización EPI ${q} ${year}`,apuntes:[
          {cuenta:"681",nombre:ctaName("681"),debe:cuotaTrim,haber:0},
          {cuenta:"281",nombre:ctaName("281"),debe:0,haber:cuotaTrim},
        ]});
      }
    });
  }
  // ─── Asiento de apertura (si OFFICIAL_CCAA tiene apertura para este año) ───
  if(OFFICIAL_CCAA[year] && OFFICIAL_CCAA[year].apertura && OFFICIAL_CCAA[year].balance) {
    const ap = OFFICIAL_CCAA[year].balance;
    const apuntesApertura = [];
    const cuentasApertura = {};
    // Extract account balances from activo
    (ap.activo||[]).forEach(item => {
      const m = item.label.match(/^(\d{3,4})\s/);
      if(m) cuentasApertura[m[1]] = (cuentasApertura[m[1]]||0) + item.val;
    });
    // Extract account balances from pasivo
    (ap.pasivo||[]).forEach(item => {
      const m = item.label.match(/^(\d{3,4})\s/);
      if(m) cuentasApertura[m[1]] = (cuentasApertura[m[1]]||0) - item.val;
    });
    // Create apertura entry: activos al debe, pasivos al haber
    Object.entries(cuentasApertura).forEach(([cta, netVal]) => {
      if(Math.abs(netVal) < 0.005) return;
      if(netVal > 0) apuntesApertura.push({cuenta:cta,nombre:ctaName(cta),debe:netVal,haber:0});
      else apuntesApertura.push({cuenta:cta,nombre:ctaName(cta),debe:0,haber:Math.abs(netVal)});
    });
    if(apuntesApertura.length > 0) {
      preAsientos.push({fecha:`${year}-01-01`,tipo:"AP",concepto:`Asiento de apertura ${year}`,ref:"apertura",apuntes:apuntesApertura});
    }
  }
  // ─── Tesorería: SOLO movimientos reales del extracto bancario ───
  if(tesoreria && tesoreria.length > 0) {
    tesoreria.forEach(t => {
      if(t.esSaldoInicial) return; // already in apertura
      const apuntes = [];
      const ctaBanco = t.banco || "5721";
      if(t.tipo === "cobro") {
        // Cobro de cliente vía banco: D:572x / H:430
        apuntes.push({cuenta:ctaBanco,nombre:ctaName(ctaBanco),debe:t.importe,haber:0});
        apuntes.push({cuenta:"430",nombre:ctaName("430"),debe:0,haber:t.importe});
      } else if(t.tipo === "pago") {
        // Pago vía banco: D:410 / H:572x (cancela deuda con proveedor)
        apuntes.push({cuenta:"410",nombre:ctaName("410"),debe:t.importe,haber:0});
        apuntes.push({cuenta:ctaBanco,nombre:ctaName(ctaBanco),debe:0,haber:t.importe});
      }
      preAsientos.push({fecha:t.fecha,tipo:t.tipo==="pago"?"PA":"CO",concepto:t.concepto,ref:t.id,apuntes});
    });
  }

  // ─── Cierre 2025: ajustar bancos a saldos reales (inspección) ───
  // Solo para 31/12/2025, sin tocar 2024 ni otros años.
  if(year === 2025) {
    const TARGET_QONTO = 35052.50;      // 5721 a 31/12/2025
    const TARGET_BANKINTER = 13120.28;  // 5720 a 31/12/2025
    const yaExiste = preAsientos.some(a => a && a.tipo === "AJ_BANCOS_CIERRE_2025");
    if(!yaExiste) {
      // Calcula saldo actual de bancos con los asientos generados hasta ahora
      const mayorTmp = generarMayor(preAsientos);
      const saldoOf = (cta) => {
        const m = mayorTmp.find(x => String(x.cuenta) === String(cta));
        return m ? (m.debe - m.haber) : 0;
      };
      const saldo5721 = saldoOf("5721");
      const saldo5720 = saldoOf("5720");
      const dif5721 = +(TARGET_QONTO - saldo5721).toFixed(2);
      const dif5720 = +(TARGET_BANKINTER - saldo5720).toFixed(2);

      const pushAjuste = (ctaBanco, dif) => {
        if(Math.abs(dif) < 0.01) return;
        // Queremos que el saldo del banco aumente si dif>0 (D:Banco / H:551)
        // y disminuya si dif<0 (D:551 / H:Banco)
        const apuntes = [];
        if(dif > 0) {
          apuntes.push({cuenta:ctaBanco,nombre:ctaName(ctaBanco),debe:dif,haber:0});
          apuntes.push({cuenta:"551",nombre:ctaName("551"),debe:0,haber:dif});
        } else {
          const amt = Math.abs(dif);
          apuntes.push({cuenta:"551",nombre:ctaName("551"),debe:amt,haber:0});
          apuntes.push({cuenta:ctaBanco,nombre:ctaName(ctaBanco),debe:0,haber:amt});
        }
        preAsientos.push({
          fecha:"2025-12-31",
          tipo:"AJ_BANCOS_CIERRE_2025",
          concepto:`Regularización conciliación bancaria cierre 2025 (${ctaBanco})`,
          ref:`AJ_BANCOS_CIERRE_2025_${ctaBanco}`,
          apuntes
        });
      };

      pushAjuste("5721", dif5721);
      pushAjuste("5720", dif5720);
    }
  }

  // ─── Sort ALL entries chronologically, then number ───
  preAsientos.sort((a,b)=>a.fecha.localeCompare(b.fecha));
  const asientos = [];
  let n = 1;
  preAsientos.forEach(a => { asientos.push({...a, n:n++}); });
  return asientos;
}
function generarMayor(asientos) {
  const cuentas = {};
  asientos.forEach(a => {
    a.apuntes.forEach(ap => {
      if(!cuentas[ap.cuenta]) cuentas[ap.cuenta] = {cuenta:ap.cuenta,nombre:ap.nombre,debe:0,haber:0,movs:[]};
      cuentas[ap.cuenta].debe += ap.debe;
      cuentas[ap.cuenta].haber += ap.haber;
      cuentas[ap.cuenta].movs.push({fecha:a.fecha,concepto:a.concepto,debe:ap.debe,haber:ap.haber});
    });
  });
  return Object.values(cuentas).sort((a,b)=>a.cuenta.localeCompare(b.cuenta)).map(c=>({...c,saldo:c.debe-c.haber}));
}

    return false;
  });
  const pasivo = mayor.filter(m => {
    const g = m.cuenta.charAt(0);
    if(g==="1") return true;
    if(m.cuenta==="410"||m.cuenta==="477"||m.cuenta==="4750"||m.cuenta==="4752"||m.cuenta==="475") return m.saldo<0;
    if(m.cuenta==="551") return m.saldo<0; // 551 acreedor = sociedad debe al socio
    return false;
  });
  return {activo,pasivo,tActivo:activo.reduce((s,m)=>s+m.saldo,0),tPasivo:pasivo.reduce((s,m)=>s-m.saldo,0)};
}
function generarPyG(mayor) {
  const ingresos = mayor.filter(m=>m.cuenta.startsWith("7"));
  const gastos = mayor.filter(m=>m.cuenta.startsWith("6"));
  const tIngresos = ingresos.reduce((s,m)=>s+m.haber-m.debe,0);
  const tGastos = gastos.reduce((s,m)=>s+m.debe-m.haber,0);
  return {ingresos,gastos,tIngresos,tGastos,resultado:tIngresos-tGastos};
}

function exportCSV(data, filename, cols) {

  const csv = "\uFEFF"+header+"\n"+rows.join("\n");

}

// CIERRE 2025 — AJUSTE BANCOS (SOLO VISTA, NO TOCA STORAGE)
// Fuerza saldos a 31/12/2025: Qonto(5721)=35052.50, Bankinter(5720)=13120.28
// mediante movimientos tesorería tipo "ajuste" contra 551.
// No afecta 2024 ni otros años.
// ─────────────────────────────────────────────────────────────
function withClosing2025BankAdjustments(tes2025, store){
  try{
    const TARGETS = {"5721": 35052.50, "5720": 13120.28};
    const existing = Array.isArray(tes2025) ? tes2025.slice() : [];
    const ids = new Set(existing.map(x=>x && x.id).filter(Boolean));
    // evitar circularidad: calcula saldo sin los ajustes
    const baseTes = existing.filter(t => !(t && t.__autoCierre2025));
    const emit = (store && store["emitidas_2025"]) ? store["emitidas_2025"] : [];
    const rec  = (store && store["recibidas_2025"]) ? store["recibidas_2025"] : [];
    const allRec = (typeof YEARS!=="undefined" && store) ? YEARS.flatMap(y=>store[`recibidas_${y}`]||[]) : rec;
    const as = generarAsientos(emit, rec, 2025, allRec, baseTes);
    const mayor = generarMayor(as);
    const saldoCuenta = (cta)=>{
      const c = mayor[cta];
      if(!c) return 0;
      return (Number(c.debe||0) - Number(c.haber||0));
    };
    const upsert = (item)=>{
      const i = existing.findIndex(x=>x && x.id===item.id);
      if(i>=0) existing[i] = {...existing[i], ...item};
      else existing.push(item);
    };

    ["5721","5720"].forEach(cta=>{
      const target = TARGETS[cta];
      const current = saldoCuenta(cta);
      const diff = +(target - current).toFixed(2);
      const id = (cta==="5721") ? "t2025-cierre-qonto" : "t2025-cierre-bankinter";
      if(Math.abs(diff) >= 0.01){
        upsert({
          id,
          tipo:(diff>0 ? "cobro" : "pago"),
          fecha:"2025-12-31",
          concepto:`Regularización conciliación bancaria cierre 2025 (${cta==="5721"?"Qonto":"Bankinter"})`,
          importe: Math.abs(diff),
          banco: cta,
          dir: diff>0 ? "in" : "out",
          __autoCierre2025:true
        });
      }else{
        // si ya cuadra, elimina el ajuste auto si existiera
        const j = existing.findIndex(x=>x && x.id===id);
        if(j>=0 && existing[j].__autoCierre2025) existing.splice(j,1);
      }
    });

    existing.sort((a,b)=>String(a.fecha||"").localeCompare(String(b.fecha||"")));
    return existing;
  }catch(e){
    return tes2025||[];
  }
}

      const ccaaDoc = {2022:"docs/corporativo/CERT_DE_APROB_CCAA_2022.pdf",2021:"docs/corporativo/AZNAR_LEGALCERTIFICADO_DE_APROBACION_CCAA2021.pdf",2020:"docs/corporativo/CERTIFICACION_AZNAR_SLP_2020_copy.pdf",2019:"docs/corporativo/CERTIF__CCAA__2019__AZANAR_LEGAL_copy.pdf"};
      const yearDocs = {

              <div style={{display:"flex",justifyContent:"space-between",padding:"10px 0",fontSize:14,fontWeight:700,borderTop:"2px solid #2E6B3A",marginTop:6}}>
                <span>TOTAL ACTIVO</span><span style={{fontFamily:"monospace",color:"#2E6B3A"}}>{fmt(balance.tActivo)}</span>
              </div>
            </div>

              <div style={{padding:"4px 0",fontSize:10,color:"#E67E22",marginBottom:8}}>⚠️ Calculado desde facturas — datos posiblemente incompletos</div>

                <span style={{fontFamily:"monospace",color:pyg.resultado>=0?"#27AE60":"#C0392B"}}>{fmt(pyg.resultado)}</span>

              <span>Total ingresos explotación</span><span style={{fontFamily:"monospace",color:"#2E6B3A"}}>{fmt(pyg.tIngresos)}</span>

            {pyg.gastos.map((m,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",padding:"6px 20px 6px 36px",fontSize:12,borderBottom:"1px solid #F0F2F5"}}>
              <span style={{color:"#7A8DA0"}}><span style={{fontFamily:"monospace",marginRight:6,fontSize:10}}>{m.cuenta}</span>{PGC[m.cuenta]||""}</span>
              <span style={{fontFamily:"monospace"}}>{fmt(m.debe-m.haber)}</span>

              <span>Total gastos explotación</span><span style={{fontFamily:"monospace",color:"#C0392B"}}>{fmt(pyg.tGastos)}</span>

              <span style={{fontFamily:"monospace",color:pyg.resultado>=0?"#27AE60":"#C0392B"}}>{fmt(pyg.resultado)}</span>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",padding:"10px 20px",fontSize:12,background:"#fff",borderTop:"1px solid #E4E9F0"}}>

            </div>
          </div>}
        </div>}
        {libroView==="docs"&&<div>
          <SectionTitle>Documentos contables y corporativos — {year}</SectionTitle>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>

      {/* MAIN */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"auto"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 24px",borderBottom:"1px solid #E4E9F0",background:"#fff"}} className="no-print">
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <button onClick={()=>setSideOpen(!sideOpen)} style={{background:"none",border:"1px solid #D5DCE4",color:"#7A8DA0",cursor:"pointer",width:32,height:32,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15}}>☰</button>
            <span style={{color:"#2E6B3A",fontSize:16,fontWeight:700}}>{sections[section]}</span>
          </div>
          <div style={{display:"flex",gap:3,flexWrap:"nowrap",overflowX:"auto"}}>
            {[2017,2018,2019,2020,2021,2022,2023,2024,2025,2026].map(y=><button key={y} onClick={()=>{setYear(y);setSearch("");setLibroView(null);}} style={{padding:"4px 8px",borderRadius:6,border:year===y?"2px solid #3D7A4A":"1px solid #D5DCE4",background:year===y?"#3D7A4A":"#fff",color:year===y?"#fff":"#7A8DA0",cursor:"pointer",fontSize:10,fontWeight:700,fontFamily:"monospace",whiteSpace:"nowrap",flexShrink:0}}>{y}</button>)}
          </div>
        </div>
        <div style={{flex:1,overflow:"auto",padding:24}}>{renderSection()}</div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<script>
(function(){
  // ---- Merge tesorería 2026 extra -> default and normalize banco
  try{
    if(typeof DEFAULT_TESORERIA_2026==="undefined" || !Array.isArray(DEFAULT_TESORERIA_2026)){
      window.DEFAULT_TESORERIA_2026 = [];
    }
    const ids = new Set(DEFAULT_TESORERIA_2026.map(t=>t&&t.id).filter(Boolean));
    if(typeof EXTRA_TESORERIA_2026!=="undefined" && Array.isArray(EXTRA_TESORERIA_2026)){
      EXTRA_TESORERIA_2026.forEach(t=>{
        if(!t || !t.id) return;
        if(ids.has(t.id)) return;
        DEFAULT_TESORERIA_2026.push(t);
        ids.add(t.id);
      });
    }
    DEFAULT_TESORERIA_2026.forEach(t=>{
      if(!t) return;
      if(t.banco===undefined || t.banco===null || t.banco==="572" || t.banco===572) t.banco="5721";
    });
  }catch(e){ console.warn("mergeTes2026 failed", e); }
})();
</script>
